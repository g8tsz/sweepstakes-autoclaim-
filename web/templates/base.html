<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Casino Claim{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #1a1a2e; color: #eee; min-height: 100vh; }
        a { color: #6ee7b7; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .nav { background: #16213e; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
        .nav a { color: #a5b4fc; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .card { background: #16213e; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        .btn:hover { background: #2563eb; }
        .btn-danger { background: #dc2626; }
        .btn-success { background: #16a34a; }
        .btn-small { padding: 0.35rem 0.75rem; font-size: 0.85rem; }
        input, select { padding: 0.5rem; border-radius: 6px; border: 1px solid #374151; background: #1f2937; color: #eee; width: 100%; max-width: 320px; }
        label { display: block; margin-bottom: 0.25rem; color: #9ca3af; }
        .form-group { margin-bottom: 1rem; }
        .error { color: #f87171; }
        .success { color: #4ade80; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .badge-success { background: #166534; }
        .badge-error { background: #991b1b; }
        .badge-info { background: #1e40af; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% if user_id %}
    <nav class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/profile">Profile</a>
        <a href="/history">History</a>
        <form action="/logout" method="post" style="margin-left: auto;">
            <button type="submit" class="btn btn-small">Logout</button>
        </form>
    </nav>
    {% endif %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
